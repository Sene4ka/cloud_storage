syntax = "proto3";

package file;
option go_package = "github.com/Sene4ka/cloud_storage/internal/api";

service MailService {
  rpc Send2FACode(Send2FACodeRequest) returns (Send2FACodeResponse);
}

message Send2FACodeRequest {
  string email_address = 1;
  string code = 2;
}

message Send2FACodeResponse {
  bool success = 1;
  string message = 2;
}
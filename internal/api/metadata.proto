syntax = "proto3";

package metadata;
option go_package = "github.com/Sene4ka/cloud_storage/internal/api";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service MetadataService {
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
  rpc ListMetadata(ListMetadataRequest) returns (ListMetadataResponse);
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse);
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
  rpc TrashFile(TrashFileRequest) returns (TrashFileResponse);
  rpc RestoreFile(RestoreFileRequest) returns (RestoreFileResponse);
}

message FileMetadata {
  string id = 1;
  string user_id = 2;
  string filename = 3;
  string original_name = 4;
  string path = 5;
  int64 size = 6;
  string mime_type = 7;
  string storage_path = 8;
  string bucket = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  bool is_public = 12;
  map<string, string> tags = 13;
  bool is_trashed = 14;
  google.protobuf.Timestamp trashed_at = 15;
}

message CreateMetadataRequest {
  string user_id = 1;
  string filename = 2;
  string original_name = 3;
  int64 size = 4;
  string mime_type = 5;
  string storage_path = 6;
  string bucket = 7;
  bool is_public = 8;
  map<string, string> tags = 9;
}

message CreateMetadataResponse {
  FileMetadata metadata = 1;
}

message GetMetadataRequest {
  string id = 1;
  string user_id = 2;
}

message GetMetadataResponse {
  FileMetadata metadata = 1;
}

message ListMetadataRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string sort_by = 4;
  string sort_order = 5;
  string search = 6;
  google.protobuf.BoolValue is_trashed = 7;
}

message ListMetadataResponse {
  repeated FileMetadata items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateMetadataRequest {
  string id = 1;
  string user_id = 2;
  string filename = 3;
  string original_name = 4;
  string path = 5;
  bool is_public = 6;
  map<string, string> tags = 7;
}

message UpdateMetadataResponse {
  FileMetadata metadata = 1;
}

message CheckAccessRequest {
  string file_id = 1;
  string user_id = 2;
}

message CheckAccessResponse {
  bool has_access = 1;
  string storage_path = 2;
  string bucket = 3;
}

message TrashFileRequest {
  string file_id = 1;
  string user_id = 2;
}

message TrashFileResponse {
  bool success = 1;
}

message RestoreFileRequest {
  string file_id = 1;
  string user_id = 2;
}

message RestoreFileResponse {
  bool success = 1;
}
services:
  # PgSQL DB
  postgres:
    image: postgres:15-alpine
    container_name: cloud_storage_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - cloud_storage_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migrations
  migrate:
    image: migrate/migrate:v4.16.2
    container_name: cloud_storage_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}",
      "up"
    ]
    networks:
      - cloud_storage_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: cloud_storage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud_storage_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: cloud_storage_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cloud_storage_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - cloud_storage_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "${GF_PORT}:${GF_PORT}"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
      - GF_PROVISIONING_ENABLED=${GF_PROVISIONING_ENABLED}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - cloud_storage_network
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: node-exporter
    ports:
      - "${NODE_EXPLORER_PORT}:${NODE_EXPLORER_PORT}"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - cloud_storage_network
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.auth
    container_name: cloud_storage_auth
    environment:
      AUTH_SERVICE_ADDR: ${AUTH_SERVICE_ADDR}
      METRICS_PORT: ${AUTH_METRICS_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      MAIL_SERVICE_ADDR: ${MAIL_SERVICE_ADDR}
    ports:
      - "50051:50051"
      - "${AUTH_METRICS_PORT}:${AUTH_METRICS_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud_storage_network

  # Metadata Service
  metadata-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.metadata
    container_name: cloud_storage_metadata
    environment:
      METADATA_SERVICE_ADDR: ${METADATA_SERVICE_ADDR}
      METRICS_PORT: ${METADATA_METRICS_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
    ports:
      - "50052:50052"
      - "${METADATA_METRICS_PORT}:${METADATA_METRICS_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloud_storage_network

  # File Service
  file-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.file
    container_name: cloud_storage_file
    environment:
      FILE_SERVICE_ADDR: ${FILE_SERVICE_ADDR}
      METRICS_PORT: ${FILE_METRICS_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_BUCKET: ${MINIO_BUCKET}
    ports:
      - "50053:50053"
      - "${FILE_METRICS_PORT}:${FILE_METRICS_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cloud_storage_network

  # Mail Service
  mail-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.mail
    container_name: cloud_storage_mail
    environment:
      MAIL_SERVICE_ADDR: ${MAIL_SERVICE_ADDR}
      METRICS_PORT: ${MAIL_METRICS_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_EMAIL_ADDRESS: ${SMTP_EMAIL_ADDRESS}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    ports:
      - "50054:50054"
      - "${SMTP_PORT}:${SMTP_PORT}"
      - "${MAIL_METRICS_PORT}:${MAIL_METRICS_PORT}"
    networks:
      - cloud_storage_network

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.gateway
    container_name: cloud_storage_gateway
    volumes:
    - ./docs/swagger:/app/docs/swagger:ro
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT}
      AUTH_SERVICE_ADDR: ${AUTH_SERVICE_ADDR}
      METADATA_SERVICE_ADDR: ${METADATA_SERVICE_ADDR}
      FILE_SERVICE_ADDR: ${FILE_SERVICE_ADDR}
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - metadata-service
      - file-service
    networks:
      - cloud_storage_network


volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  cloud_storage_network:
    driver: bridge